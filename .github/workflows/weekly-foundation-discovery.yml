name: 고립청년 재단 후보 탐색 (주간)

on:
  schedule:
    # 매주 월요일 00:00 UTC = 09:00 KST
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scraper/package-lock.json

      - name: 의존성 설치
        working-directory: scraper
        run: npm install

      - name: 재단 후보 검색
        working-directory: scraper
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
        run: npm run discover:foundations

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/foundations.json
          git diff --staged --quiet || git commit -m "chore: 재단 후보 목록 갱신 $(date +'%Y-%m-%d')"
          git push
